# Repo-local Codex sessions shadow any global ~/.codex/hooks.json via
# `scripts/codex-home-launch.sh`, so ordinary interactive runs stay silent by
# default.
#
# `scripts/agent-autopilot.sh` and `.codex/codex-shell-helpers.sh` only stage
# `.codex/autopilot-hooks.json` or `.codex/ralph-loop-hooks.json` into a
# temporary CODEX_HOME only when autopilot is enabled or Ralph Loop state is
# active.
