[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cmux-agent-sdk"
dynamic = ["version"]
description = "Unified agent SDK for cmux - spawn Claude, Codex, Gemini, Amp, Opencode agents in remote sandboxes"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "cmux", email = "dev@cmux.sh" }
]
keywords = [
    "cmux",
    "agent",
    "sdk",
    "claude",
    "codex",
    "gemini",
    "sandbox",
    "orchestration"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
]

[project.urls]
Homepage = "https://github.com/karlorz/cmux"
Documentation = "https://github.com/karlorz/cmux/tree/main/packages/agent-sdk-python"
Repository = "https://github.com/karlorz/cmux"

[tool.hatch.build.targets.wheel]
packages = ["src/cmux_agent_sdk"]

[tool.hatch.version]
path = "src/cmux_agent_sdk/__init__.py"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
