<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

    /* Status Strip - compact persistent bar */
    .status-strip {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #171717;
      border: 1px solid #262626;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 12px;
      overflow-x: auto;
    }
    .status-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 9999px;
      font-weight: 500;
      white-space: nowrap;
    }
    .chip-green { background: #166534; color: #bbf7d0; }
    .chip-amber { background: #92400e; color: #fde68a; }
    .chip-red { background: #991b1b; color: #fecaca; }
    .chip-blue { background: #1e40af; color: #bfdbfe; }
    .chip-neutral { background: #404040; color: #d4d4d4; }
    .status-divider { width: 1px; height: 16px; background: #404040; }
    .status-meta { color: #a3a3a3; display: flex; align-items: center; gap: 4px; }
    .status-meta code { font-family: monospace; color: #d4d4d4; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #262626;
    }
    h1 { font-size: 24px; font-weight: 600; }
    .badge {
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-completed { background: #166534; color: #bbf7d0; }
    .badge-failed { background: #991b1b; color: #fecaca; }
    .badge-running { background: #1e40af; color: #bfdbfe; }
    .badge-pending { background: #525252; color: #d4d4d4; }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #171717;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .stat-value { font-size: 32px; font-weight: 700; }
    .stat-label { font-size: 12px; color: #a3a3a3; margin-top: 4px; }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      border-bottom: 1px solid #262626;
    }
    .tab {
      padding: 12px 20px;
      background: none;
      border: none;
      color: #a3a3a3;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: #e5e5e5; }
    .tab.active { color: #e5e5e5; border-bottom-color: #3b82f6; }

    .surface { display: none; }
    .surface.active { display: block; }

    .task-list { display: flex; flex-direction: column; gap: 12px; }
    .task-card {
      background: #171717;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .task-card:hover { border-color: #404040; }
    .task-card.selected { border-color: #3b82f6; }
    .task-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px; }
    .task-id { font-family: monospace; font-size: 12px; color: #737373; }
    .task-prompt { font-size: 14px; line-height: 1.5; }
    .task-meta { display: flex; gap: 12px; margin-top: 12px; font-size: 12px; color: #737373; }

    .detail-panel {
      background: #171717;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 20px;
      margin-top: 24px;
    }
    .detail-section { margin-bottom: 20px; }
    .detail-section:last-child { margin-bottom: 0; }
    .detail-label { font-size: 12px; color: #737373; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .detail-content {
      background: #0a0a0a;
      border: 1px solid #262626;
      border-radius: 6px;
      padding: 12px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
    }

    /* Activity Timeline */
    .events-timeline { max-height: 500px; overflow-y: auto; }
    .event-item {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #262626;
    }
    .event-time { font-family: monospace; font-size: 12px; color: #737373; white-space: nowrap; }
    .event-type { font-size: 12px; font-weight: 500; }
    .event-message { font-size: 13px; color: #d4d4d4; }

    /* Inspector panel */
    .inspector-section { margin-bottom: 16px; }
    .inspector-section:last-child { margin-bottom: 0; }
    .inspector-label { font-size: 11px; color: #737373; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .inspector-value { font-size: 13px; color: #e5e5e5; }
    .inspector-value code { font-family: monospace; background: #262626; padding: 2px 6px; border-radius: 4px; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #737373;
    }

    @media (max-width: 768px) {
      .container { padding: 16px; }
      .summary { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Region 1: Status Strip -->
    <div class="status-strip" id="status-strip">
      <span class="status-chip chip-neutral" id="lifecycle-chip">Loading...</span>
    </div>

    <header>
      <div>
        <h1>Run Dashboard</h1>
        <p id="orchestration-id" style="font-family: monospace; font-size: 12px; color: #737373; margin-top: 4px;"></p>
      </div>
      <span id="status-badge" class="badge"></span>
    </header>

    <div class="summary" id="summary"></div>

    <div class="tabs">
      <button class="tab active" data-surface="timeline">Activity Timeline</button>
      <button class="tab" data-surface="tasks">Tasks</button>
      <button class="tab" data-surface="inspector">Inspector</button>
      <button class="tab" data-surface="logs" id="logs-tab" style="display: none;">Logs</button>
    </div>

    <!-- Region 2: Activity Timeline -->
    <div id="timeline" class="surface active">
      <div class="events-timeline" id="events-list"></div>
      <div class="empty-state" id="events-empty" style="display: none;">No events captured yet</div>
    </div>

    <!-- Tasks surface -->
    <div id="tasks" class="surface">
      <div class="task-list" id="task-list"></div>
      <div class="detail-panel" id="task-detail" style="display: none;">
        <div class="detail-section">
          <div class="detail-label">Prompt</div>
          <div class="detail-content" id="task-prompt"></div>
        </div>
        <div class="detail-section" id="result-section" style="display: none;">
          <div class="detail-label">Result</div>
          <div class="detail-content" id="task-result"></div>
        </div>
        <div class="detail-section" id="error-section" style="display: none;">
          <div class="detail-label">Error</div>
          <div class="detail-content" id="task-error" style="color: #fca5a5;"></div>
        </div>
      </div>
    </div>

    <!-- Region 5: Inspector (continuation, session, memory) -->
    <div id="inspector" class="surface">
      <div class="detail-panel">
        <div class="detail-section">
          <div class="detail-label">Run Control</div>
          <div class="detail-content" id="run-control-summary"></div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Continuation</div>
          <div id="continuation-info">
            <div class="inspector-section">
              <div class="inspector-label">Mode</div>
              <div class="inspector-value" id="continuation-mode">--</div>
            </div>
            <div class="inspector-section" id="session-section" style="display: none;">
              <div class="inspector-label">Session / Thread ID</div>
              <div class="inspector-value"><code id="session-id">--</code></div>
            </div>
            <div class="inspector-section" id="checkpoint-section" style="display: none;">
              <div class="inspector-label">Checkpoint Ref</div>
              <div class="inspector-value"><code id="checkpoint-ref">--</code></div>
            </div>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Export Info</div>
          <div class="detail-content" id="export-info"></div>
        </div>
      </div>
    </div>

    <!-- Logs surface -->
    <div id="logs" class="surface">
      <div class="detail-panel">
        <div class="detail-section" id="stdout-section">
          <div class="detail-label">Stdout</div>
          <div class="detail-content" id="logs-stdout" style="max-height: 400px;"></div>
        </div>
        <div class="detail-section" id="stderr-section">
          <div class="detail-label">Stderr</div>
          <div class="detail-content" id="logs-stderr" style="max-height: 400px; color: #fca5a5;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let bundle = null;
    let selectedTaskId = null;

    async function loadBundle() {
      const res = await fetch('/api/bundle');
      bundle = await res.json();
      render();
    }

    function render() {
      document.getElementById('orchestration-id').textContent = bundle.orchestration.id;

      const statusBadge = document.getElementById('status-badge');
      statusBadge.textContent = bundle.orchestration.status;
      statusBadge.className = 'badge badge-' + bundle.orchestration.status;

      // Render Status Strip
      renderStatusStrip();

      document.getElementById('summary').innerHTML = `
        <div class="stat-card">
          <div class="stat-value">${bundle.summary.totalTasks}</div>
          <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: #4ade80;">${bundle.summary.completedTasks}</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: #f87171;">${bundle.summary.failedTasks}</div>
          <div class="stat-label">Failed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: #60a5fa;">${bundle.summary.runningTasks}</div>
          <div class="stat-label">Running</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: #a3a3a3;">${bundle.summary.pendingTasks}</div>
          <div class="stat-label">Pending</div>
        </div>
      `;

      // Render Inspector run-control summary
      document.getElementById('run-control-summary').textContent =
        `Status: ${bundle.orchestration.status}\n` +
        `Tasks: ${bundle.summary.totalTasks} total\n` +
        `  - Completed: ${bundle.summary.completedTasks}\n` +
        `  - Failed: ${bundle.summary.failedTasks}\n` +
        `  - Running: ${bundle.summary.runningTasks}\n` +
        `  - Pending: ${bundle.summary.pendingTasks}`;

      document.getElementById('export-info').textContent =
        `Exported: ${bundle.exportedAt}\nVersion: ${bundle.version}`;

      renderTasks();
      renderEvents();
      renderLogs();
      renderInspector();
    }

    function renderStatusStrip() {
      const strip = document.getElementById('status-strip');
      const status = bundle.orchestration.status;
      const chipClass = {
        completed: 'chip-green',
        failed: 'chip-red',
        running: 'chip-blue',
        pending: 'chip-neutral'
      }[status] || 'chip-neutral';

      let html = `<span class="status-chip ${chipClass}">${capitalize(status)}</span>`;

      // Add metadata from bundle if available
      if (bundle.metadata) {
        if (bundle.metadata.gitBranch) {
          html += `<span class="status-divider"></span>`;
          html += `<span class="status-meta"><code>${bundle.metadata.gitBranch}</code></span>`;
        }
        if (bundle.metadata.agentCLI) {
          html += `<span class="status-divider"></span>`;
          html += `<span class="status-meta">${bundle.metadata.agentCLI}</span>`;
        }
      }

      // Add freshness indicator
      if (bundle.exportedAt) {
        const age = Date.now() - new Date(bundle.exportedAt).getTime();
        const freshness = formatFreshness(age);
        html += `<span style="margin-left: auto;" class="status-meta">${freshness}</span>`;
      }

      strip.innerHTML = html;
    }

    function renderInspector() {
      // Determine continuation mode from bundle data
      let mode = 'append_instruction';
      let sessionId = null;
      let checkpointRef = null;

      // Check if we have continuation info in metadata
      if (bundle.metadata) {
        if (bundle.metadata.sessionId) {
          mode = 'session_continuation';
          sessionId = bundle.metadata.sessionId;
        }
        if (bundle.metadata.threadId) {
          mode = 'session_continuation';
          sessionId = bundle.metadata.threadId;
        }
        if (bundle.metadata.checkpointRef) {
          mode = 'checkpoint_restore';
          checkpointRef = bundle.metadata.checkpointRef;
        }
      }

      // Update continuation mode display
      const modeLabels = {
        'session_continuation': 'Continue session',
        'checkpoint_restore': 'Resume checkpoint',
        'append_instruction': 'Append instruction'
      };
      document.getElementById('continuation-mode').textContent = modeLabels[mode] || mode;

      // Show/hide session section
      const sessionSection = document.getElementById('session-section');
      if (sessionId) {
        sessionSection.style.display = 'block';
        document.getElementById('session-id').textContent = sessionId;
      } else {
        sessionSection.style.display = 'none';
      }

      // Show/hide checkpoint section
      const checkpointSection = document.getElementById('checkpoint-section');
      if (checkpointRef) {
        checkpointSection.style.display = 'block';
        document.getElementById('checkpoint-ref').textContent = checkpointRef;
      } else {
        checkpointSection.style.display = 'none';
      }
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function formatFreshness(ageMs) {
      const seconds = Math.floor(ageMs / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);

      if (seconds < 10) return 'just now';
      if (seconds < 60) return seconds + 's ago';
      if (minutes < 60) return minutes + 'm ago';
      if (hours < 24) return hours + 'h ago';
      return Math.floor(hours / 24) + 'd ago';
    }

    function renderLogs() {
      const logsTab = document.getElementById('logs-tab');
      const stdoutSection = document.getElementById('stdout-section');
      const stderrSection = document.getElementById('stderr-section');

      if (!bundle.logs || (!bundle.logs.stdout && !bundle.logs.stderr)) {
        logsTab.style.display = 'none';
        return;
      }

      logsTab.style.display = 'inline-block';

      if (bundle.logs.stdout) {
        stdoutSection.style.display = 'block';
        document.getElementById('logs-stdout').textContent = bundle.logs.stdout;
      } else {
        stdoutSection.style.display = 'none';
      }

      if (bundle.logs.stderr) {
        stderrSection.style.display = 'block';
        document.getElementById('logs-stderr').textContent = bundle.logs.stderr;
      } else {
        stderrSection.style.display = 'none';
      }
    }

    function renderTasks() {
      const list = document.getElementById('task-list');
      if (bundle.tasks.length === 0) {
        list.innerHTML = '<div class="empty-state">No tasks in this orchestration</div>';
        return;
      }

      list.innerHTML = bundle.tasks.map(task => `
        <div class="task-card ${selectedTaskId === task.taskId ? 'selected' : ''}" data-task-id="${task.taskId}">
          <div class="task-header">
            <span class="task-id">${task.taskId}</span>
            <span class="badge badge-${task.status}">${task.status}</span>
          </div>
          <div class="task-prompt">${escapeHtml(truncate(task.prompt, 200))}</div>
          <div class="task-meta">
            ${task.agentName ? `<span>Agent: ${task.agentName}</span>` : ''}
            ${task.taskRunId ? `<span>Run: ${task.taskRunId}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderEvents() {
      const list = document.getElementById('events-list');
      const emptyState = document.getElementById('events-empty');

      if (!bundle.events || bundle.events.length === 0) {
        list.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      list.innerHTML = bundle.events.map(event => `
        <div class="event-item">
          <span class="event-time">${formatTime(event.timestamp)}</span>
          <div>
            <div class="event-type">${event.type}</div>
            <div class="event-message">${escapeHtml(event.message)}</div>
          </div>
        </div>
      `).join('');
    }

    function showTaskDetail(taskId) {
      const task = bundle.tasks.find(t => t.taskId === taskId);
      if (!task) return;

      selectedTaskId = taskId;
      renderTasks();

      document.getElementById('task-prompt').textContent = task.prompt;

      const resultSection = document.getElementById('result-section');
      const errorSection = document.getElementById('error-section');

      if (task.result) {
        resultSection.style.display = 'block';
        document.getElementById('task-result').textContent = task.result;
      } else {
        resultSection.style.display = 'none';
      }

      if (task.errorMessage) {
        errorSection.style.display = 'block';
        document.getElementById('task-error').textContent = task.errorMessage;
      } else {
        errorSection.style.display = 'none';
      }

      document.getElementById('task-detail').style.display = 'block';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function truncate(text, maxLen) {
      return text.length > maxLen ? text.slice(0, maxLen) + '...' : text;
    }

    function formatTime(ts) {
      try {
        return new Date(ts).toLocaleTimeString();
      } catch {
        return ts;
      }
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.surface').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.surface).classList.add('active');
      });
    });

    document.getElementById('task-list').addEventListener('click', (e) => {
      const card = e.target.closest('.task-card');
      if (card) showTaskDetail(card.dataset.taskId);
    });

    // Watch mode: check if enabled and set up auto-refresh
    async function checkWatchMode() {
      try {
        const res = await fetch('/api/watch');
        const data = await res.json();
        if (data.watch || data.live) {
          // Show watch mode indicator in status strip
          const strip = document.getElementById('status-strip');
          const indicator = document.createElement('span');
          const isLive = data.live;
          indicator.className = 'status-chip ' + (isLive ? 'chip-green' : 'chip-blue');
          indicator.textContent = isLive ? 'LIVE' : 'WATCH';
          indicator.id = 'live-indicator';
          strip.insertBefore(indicator, strip.firstChild);

          // Auto-refresh: 2s for live mode, 5s for watch mode
          const interval = data.interval || (isLive ? 2000 : 5000);
          setInterval(async () => {
            await loadBundle();
            // Flash the indicator
            const ind = document.getElementById('live-indicator');
            if (ind) {
              ind.style.background = '#22c55e';
              setTimeout(() => ind.className = 'status-chip ' + (isLive ? 'chip-green' : 'chip-blue'), 200);
            }
          }, interval);
        }
      } catch (e) {
        console.error('Failed to check watch mode:', e);
      }
    }

    loadBundle();
    checkWatchMode();
  </script>
</body>
</html>
