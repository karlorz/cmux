name: Publish SDK Packages

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - typescript-agent-sdk
          - typescript-mcp-server
          - python
          - all
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        type: boolean
        default: true

jobs:
  publish-typescript-agent-sdk:
    if: ${{ inputs.package == 'typescript-agent-sdk' || inputs.package == 'all' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/agent-sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: cd ../.. && bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Publish to npm (dry run)
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run --access public

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-typescript-mcp-server:
    if: ${{ inputs.package == 'typescript-mcp-server' || inputs.package == 'all' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: cd ../.. && bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Publish to npm (dry run)
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run --access public

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    if: ${{ inputs.package == 'python' || inputs.package == 'all' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/agent-sdk-python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Build
        run: uv build

      - name: Publish to PyPI (dry run)
        if: ${{ inputs.dry_run }}
        run: uv publish --dry-run

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
