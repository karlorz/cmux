name: Docker (cmux-server)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Trigger Coolify deploy after build"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-cmux-server-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: cmux-server
  DOCKERFILE: apps/server/Dockerfile
  CONTEXT: .

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
      ghcr_image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            docker.io/${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}
          tags: |
            # SHA tags for precise tracking
            type=sha,prefix=sha-,format=short
            # latest for main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Branch name
            type=ref,event=branch
            # Timestamp for ordering
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Output image info
        run: |
          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  trigger-coolify:
    name: Trigger Coolify deployment
    runs-on: ubuntu-24.04
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 5

    steps:
      - name: Trigger Coolify deploy
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ -z "${COOLIFY_BASE_URL:-}" || -z "${COOLIFY_API_TOKEN:-}" ]]; then
            echo "Coolify secrets not configured, skipping deploy trigger"
            exit 0
          fi

          base_url="${COOLIFY_BASE_URL%/}"

          echo "Triggering Coolify deployment..."

          response=$(curl -sS -w "\n%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            -X POST \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -d '{"force":true}' \
            "${base_url}/api/v1/applications/${COOLIFY_APP_UUID}/deploy" || true)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [[ "$http_code" == "200" || "$http_code" == "201" ]]; then
            echo "Successfully triggered Coolify deployment"
            echo "Response: $body"
          else
            echo "Warning: Coolify deploy trigger returned HTTP ${http_code}"
            echo "Response: $body"
            # Don't fail - image was pushed successfully
          fi
