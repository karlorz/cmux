name: Tests (Linux + macOS)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ github.token }}
          filters: |
            src:
              - '**'
              - '!dev-docs/**'

  # Always reports success — satisfies branch protection when heavy jobs are skipped
  test:
    needs: changes
    if: always() && needs.changes.outputs.src != 'true'
    name: Run tests on ubuntu-24.04
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Skipped — only dev-docs changed"

  # Full test suite — only runs when source files changed
  test-full:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    name: Run tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        # os: [ubuntu-24.04, macos-13]
        # os: [ubuntu-24.04, macos-13-large]
        # TODO: enable macos when we can make it fast
        os: [ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/server/native/core

      - name: Install dependencies (skip Electron download, retry on transient failure)
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            if bun install --frozen-lockfile; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "bun install failed after $attempt attempts" >&2
              exit 1
            fi

            echo "bun install failed on attempt $attempt, retrying in 15 seconds..." >&2
            sleep 15
          done

      - name: Build native-core addon
        run: bun run build
        working-directory: apps/server/native/core

      - name: Run devsh Go tests
        run: |
          cd packages/devsh
          go test ./...

      - name: Run tests
        env:
          # CI environment flag
          CI: "true"
          # Keep default; set to 1 only if you want cross-builds for Linux
          CMUX_BUILD_LINUX: "0"
          # Skip Docker E2E tests in CI for stability/speed
          CMUX_SKIP_DOCKER_TESTS: "1"
          # Skip cargo crates handled in dedicated workflows
          CMUX_SKIP_CARGO_CRATES: "sandbox,cmux-env,cmux-pty,cmux-proxy,global-proxy,server/native/core"
          # Stack Auth env vars
          STACK_SECRET_SERVER_KEY: ${{ secrets.STACK_SECRET_SERVER_KEY }}
          STACK_SUPER_SECRET_ADMIN_KEY: ${{ secrets.STACK_SUPER_SECRET_ADMIN_KEY }}
          STACK_DATA_VAULT_SECRET: ${{ secrets.STACK_DATA_VAULT_SECRET }}
          NEXT_PUBLIC_STACK_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_STACK_PROJECT_ID }}
          NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${{ secrets.NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY }}
          # GitHub App
          CMUX_GITHUB_APP_ID: ${{ secrets.CMUX_GITHUB_APP_ID }}
          CMUX_GITHUB_APP_PRIVATE_KEY: ${{ secrets.CMUX_GITHUB_APP_PRIVATE_KEY }}
          CMUX_TASK_RUN_JWT_SECRET: ${{ secrets.CMUX_TASK_RUN_JWT_SECRET }}
          # API Keys
          MORPH_API_KEY: ${{ secrets.MORPH_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          # Sandbox providers (v2 API)
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          # Convex - Cloud (use CONVEX_DEPLOY_KEY) or Self-hosted (use CONVEX_SELF_HOSTED_*)
          # When CONVEX_SELF_HOSTED_ADMIN_KEY is set, CONVEX_DEPLOY_KEY is unset in the run script
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_SELF_HOSTED_URL: ${{ secrets.CONVEX_SELF_HOSTED_URL }}
          CONVEX_SELF_HOSTED_ADMIN_KEY: ${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_WWW_ORIGIN: ${{ secrets.NEXT_PUBLIC_WWW_ORIGIN }}
          NEXT_PUBLIC_GITHUB_APP_SLUG: ${{ secrets.NEXT_PUBLIC_GITHUB_APP_SLUG }}
          # Test user and team
          STACK_TEST_USER_ID: ${{ secrets.STACK_TEST_USER_ID }}
          CMUX_TEST_TEAM_SLUG: ${{ secrets.CMUX_TEST_TEAM_SLUG }}
        run: |
          # Unset CONVEX_DEPLOY_KEY when using self-hosted Convex
          if [ -n "$CONVEX_SELF_HOSTED_ADMIN_KEY" ]; then
            unset CONVEX_DEPLOY_KEY
          fi
          bun run test

  python-sdk:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    name: Validate Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/agent-sdk-python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build
