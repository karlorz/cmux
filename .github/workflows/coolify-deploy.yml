name: Coolify Deploy

# Deploy the unified cmux-web Coolify stack exactly once per commit after all
# three web images have finished building successfully. The workflow resolves
# immutable GHCR digests, writes them into Coolify service env vars, and only
# then triggers deployment.

on:
  workflow_run:
    workflows:
      - Docker (cmux-client)
      - Docker (cmux-www)
      - Docker (cmux-server)
    types:
      - completed
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to the current main HEAD)"
        required: false
        type: string
      force:
        description: "Force deployment even if images are unchanged"
        type: boolean
        default: true

permissions:
  actions: read
  contents: read
  deployments: write
  packages: read

concurrency:
  group: coolify-deploy-${{ github.event.workflow_run.head_sha || inputs.sha || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Coolify
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ENVIRONMENT_NAME: Production - cmux

    steps:
      - name: Resolve target commit
        id: target
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const isManual = context.eventName === "workflow_dispatch";
            let sha = "";
            let branch = "main";

            if (isManual) {
              const requestedSha = core.getInput("sha").trim();
              const repoInfo = await github.rest.repos.get({ owner, repo });
              branch = repoInfo.data.default_branch;

              if (requestedSha) {
                sha = requestedSha;
              } else {
                const branchInfo = await github.rest.repos.getBranch({
                  owner,
                  repo,
                  branch,
                });
                sha = branchInfo.data.commit.sha;
              }
            } else {
              sha = context.payload.workflow_run.head_sha;
              branch = context.payload.workflow_run.head_branch || "main";
            }

            if (!sha) {
              core.setFailed("Unable to determine target SHA for Coolify deployment.");
              return;
            }

            core.setOutput("sha", sha);
            core.setOutput("short_sha", sha.slice(0, 7));
            core.setOutput("branch", branch);

      - name: Wait for all web image workflows
        id: wait_for_images
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        with:
          script: |
            const targetSha = process.env.TARGET_SHA;
            const { owner, repo } = context.repo;
            const workflows = [
              { id: "docker-client-build.yml", name: "Docker (cmux-client)" },
              { id: "docker-www-build.yml", name: "Docker (cmux-www)" },
              { id: "docker-server-build.yml", name: "Docker (cmux-server)" },
            ];

            const timeoutMs = 40 * 60 * 1000;
            const pollIntervalMs = 15 * 1000;
            const deadline = Date.now() + timeoutMs;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            while (Date.now() < deadline) {
              let allComplete = true;
              const statuses = [];

              for (const workflow of workflows) {
                const response = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: workflow.id,
                  head_sha: targetSha,
                  per_page: 10,
                });

                const run = response.data.workflow_runs
                  .filter((candidate) =>
                    ["push", "workflow_dispatch", "workflow_run"].includes(candidate.event),
                  )
                  .sort(
                    (left, right) =>
                      new Date(right.created_at).getTime() -
                      new Date(left.created_at).getTime(),
                  )[0];

                if (!run) {
                  allComplete = false;
                  statuses.push(`${workflow.name}: waiting for run to appear`);
                  continue;
                }

                if (run.status !== "completed") {
                  allComplete = false;
                  statuses.push(`${workflow.name}: ${run.status} (${run.html_url})`);
                  continue;
                }

                if (run.conclusion !== "success") {
                  core.setFailed(
                    `${workflow.name} for ${targetSha.slice(0, 7)} finished with ${run.conclusion}. ${run.html_url}`,
                  );
                  return;
                }

                statuses.push(`${workflow.name}: success (${run.html_url})`);
              }

              core.info(statuses.join(" | "));

              if (allComplete) {
                core.setOutput("status", "ready");
                return;
              }

              await sleep(pollIntervalMs);
            }

            core.setFailed(
              `Timed out waiting for Docker image workflows for ${targetSha.slice(0, 7)} to complete.`,
            );

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve immutable image refs
        id: image_refs
        env:
          IMAGE_TAG: sha-${{ steps.target.outputs.short_sha }}
          REGISTRY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          resolve_ref() {
            local image_name="$1"
            local tag_ref="ghcr.io/${REGISTRY_OWNER}/${image_name}:${IMAGE_TAG}"
            local digest

            digest="$(docker buildx imagetools inspect "${tag_ref}" | sed -n 's/^Digest:[[:space:]]*//p' | head -n1)"
            if [[ -z "${digest:-}" ]]; then
              echo "::error::Failed to resolve digest for ${tag_ref}"
              exit 1
            fi

            printf 'ghcr.io/%s/%s@%s\n' "${REGISTRY_OWNER}" "${image_name}" "${digest}"
          }

          client_ref="$(resolve_ref cmux-client)"
          www_ref="$(resolve_ref cmux-www)"
          server_ref="$(resolve_ref cmux-server)"

          echo "client_ref=${client_ref}" >> "$GITHUB_OUTPUT"
          echo "www_ref=${www_ref}" >> "$GITHUB_OUTPUT"
          echo "server_ref=${server_ref}" >> "$GITHUB_OUTPUT"

          {
            echo "## Coolify Release"
            echo
            echo "- Commit: \`${{ steps.target.outputs.sha }}\`"
            echo "- Client: \`${client_ref}\`"
            echo "- WWW: \`${www_ref}\`"
            echo "- Server: \`${server_ref}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub deployment
        id: gh_deployment
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const ref = process.env.TARGET_SHA;
            const runUrl = process.env.RUN_URL;
            const environment = process.env.ENVIRONMENT_NAME;

            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref,
              environment,
              auto_merge: false,
              required_contexts: [],
              description: `Coolify deploy for ${ref.slice(0, 7)}`,
              transient_environment: false,
              production_environment: true,
            });

            core.setOutput("deployment_id", deployment.data.id);

            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deployment.data.id,
              state: "in_progress",
              log_url: runUrl,
              description: "Updating Coolify image refs",
            });

      - name: Update Coolify image env vars
        id: update_envs
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_RESOURCE_UUID: ${{ secrets.COOLIFY_SERVICE_UUID || secrets.COOLIFY_APP_UUID }}
          CLIENT_IMAGE_REF: ${{ steps.image_refs.outputs.client_ref }}
          WWW_IMAGE_REF: ${{ steps.image_refs.outputs.www_ref }}
          SERVER_IMAGE_REF: ${{ steps.image_refs.outputs.server_ref }}
        run: |
          set -euo pipefail

          if [[ -z "${COOLIFY_BASE_URL:-}" || -z "${COOLIFY_API_TOKEN:-}" || -z "${COOLIFY_RESOURCE_UUID:-}" ]]; then
            echo "::error::Missing required Coolify secrets"
            exit 1
          fi

          base_url="${COOLIFY_BASE_URL%/}"
          env_url="${base_url}/api/v1/services/${COOLIFY_RESOURCE_UUID}/envs"
          auth_header="Authorization: Bearer ${COOLIFY_API_TOKEN}"
          list_response="$(curl -sS -w '\n%{http_code}' \
            --connect-timeout 10 --max-time 30 \
            -H "Accept: application/json" \
            -H "${auth_header}" \
            "${env_url}" || true)"
          list_http_code="$(echo "${list_response}" | tail -n1)"
          existing_envs="$(echo "${list_response}" | sed '$d')"

          if [[ "${list_http_code}" != "200" ]]; then
            echo "::error::Failed to list Coolify service envs (HTTP ${list_http_code})"
            echo "${existing_envs}"
            exit 1
          fi

          upsert_env() {
            local key="$1"
            local value="$2"
            local method="POST"
            local response
            local http_code
            local body

            if jq -e --arg key "${key}" '
              (
                if type == "array" then .
                elif has("data") and (.data | type) == "array" then .data
                else []
                end
              )[]?
              | select(.key == $key)
            ' <<< "${existing_envs}" >/dev/null; then
              method="PATCH"
            fi

            body="$(jq -nc --arg key "${key}" --arg value "${value}" '{
              key: $key,
              value: $value,
              is_preview: false,
              is_literal: false,
              is_multiline: false,
              is_shown_once: false
            }')"

            response="$(curl -sS -w '\n%{http_code}' \
              --connect-timeout 10 --max-time 30 \
              -X "${method}" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -H "${auth_header}" \
              -d "${body}" \
              "${env_url}" || true)"

            http_code="$(echo "${response}" | tail -n1)"
            if [[ "${http_code}" != "200" && "${http_code}" != "201" ]]; then
              echo "::error::Failed to ${method} ${key} in Coolify (HTTP ${http_code})"
              echo "${response}" | sed '$d'
              exit 1
            fi
          }

          upsert_env CLIENT_IMAGE "${CLIENT_IMAGE_REF}"
          upsert_env WWW_IMAGE "${WWW_IMAGE_REF}"
          upsert_env SERVER_IMAGE "${SERVER_IMAGE_REF}"

      - name: Trigger Coolify deploy
        id: trigger
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_RESOURCE_UUID: ${{ secrets.COOLIFY_SERVICE_UUID || secrets.COOLIFY_APP_UUID }}
          MANUAL_FORCE_DEPLOY: ${{ inputs.force }}
        run: |
          set -euo pipefail

          base_url="${COOLIFY_BASE_URL%/}"
          force_deploy="true"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            force_deploy="${MANUAL_FORCE_DEPLOY}"
          fi

          response="$(curl -sS -w '\n%{http_code}' \
            --connect-timeout 10 --max-time 30 \
            -X GET \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            "${base_url}/api/v1/deploy?uuid=${COOLIFY_RESOURCE_UUID}&force=${force_deploy}" || true)"

          http_code="$(echo "${response}" | tail -n1)"
          body="$(echo "${response}" | sed '$d')"

          if [[ "${http_code}" != "200" && "${http_code}" != "201" ]]; then
            echo "::error::Coolify deploy trigger returned HTTP ${http_code}"
            echo "Response: ${body}"
            exit 1
          fi

          deployment_uuid="$(jq -r '.deployments[0].deployment_uuid // empty' <<< "${body}")"
          if [[ -n "${deployment_uuid:-}" ]]; then
            echo "deployment_uuid=${deployment_uuid}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for service health
        id: wait_for_service
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_RESOURCE_UUID: ${{ secrets.COOLIFY_SERVICE_UUID || secrets.COOLIFY_APP_UUID }}
          COOLIFY_ENV_URL: ${{ secrets.COOLIFY_ENV_URL }}
        run: |
          set -euo pipefail

          base_url="${COOLIFY_BASE_URL%/}"
          auth_header="Authorization: Bearer ${COOLIFY_API_TOKEN}"
          service_url="${base_url}/api/v1/services/${COOLIFY_RESOURCE_UUID}"

          deadline=$(( $(date +%s) + 1200 ))
          poll_interval=10
          tmp_file="$(mktemp)"
          trap 'rm -f "$tmp_file"' EXIT

          while (( $(date +%s) < deadline )); do
            http_code="$(curl -sS -o "${tmp_file}" -w '%{http_code}' \
              --connect-timeout 10 --max-time 30 \
              -H "Accept: application/json" \
              -H "${auth_header}" \
              "${service_url}" || true)"

            if [[ "${http_code}" != "200" ]]; then
              echo "Coolify service API returned HTTP ${http_code}; retrying..."
              sleep "${poll_interval}"
              continue
            fi

            service_status="$(jq -r '.status // "unknown"' "${tmp_file}")"
            apps_healthy="$(jq -r '[.applications[].status == "running:healthy"] | all' "${tmp_file}")"
            client_url="$(jq -r '.applications[] | select(.name == "cmux-client") | .fqdn // empty' "${tmp_file}")"

            echo "Coolify service status: ${service_status}"

            if [[ -n "${client_url:-}" && "${client_url:-null}" != "null" ]]; then
              echo "environment_url=${client_url%:8080}" >> "$GITHUB_OUTPUT"
            elif [[ -n "${COOLIFY_ENV_URL:-}" ]]; then
              echo "environment_url=${COOLIFY_ENV_URL}" >> "$GITHUB_OUTPUT"
            fi

            if [[ "${service_status}" == "running:healthy" && "${apps_healthy}" == "true" ]]; then
              echo "conclusion=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep "${poll_interval}"
          done

          echo "conclusion=failure" >> "$GITHUB_OUTPUT"
          echo "::error::Timed out waiting for Coolify service to become healthy"
          exit 1

      - name: Update GitHub deployment status
        if: always()
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.gh_deployment.outputs.deployment_id }}
          CONCLUSION: ${{ steps.wait_for_service.outputs.conclusion || 'failure' }}
          ENVIRONMENT_URL: ${{ steps.wait_for_service.outputs.environment_url }}
        with:
          script: |
            const deploymentIdRaw = process.env.DEPLOYMENT_ID;
            if (!deploymentIdRaw) {
              core.warning("No GitHub deployment id found. Skipping status update.");
              return;
            }

            const { owner, repo } = context.repo;
            const deploymentId = Number(deploymentIdRaw);
            const runUrl = process.env.RUN_URL;
            const conclusion = process.env.CONCLUSION || "failure";
            const envUrlRaw = (process.env.ENVIRONMENT_URL || "").trim();
            const envUrl = /^https?:\/\/\S+$/i.test(envUrlRaw) ? envUrlRaw : undefined;
            const state = conclusion === "success" ? "success" : "failure";
            const description =
              state === "success"
                ? "Coolify deployment succeeded"
                : "Coolify deployment failed";

            const payload = {
              owner,
              repo,
              deployment_id: deploymentId,
              state,
              log_url: runUrl,
              description,
            };

            if (envUrl) {
              payload.environment_url = envUrl;
            }

            await github.rest.repos.createDeploymentStatus(payload);
