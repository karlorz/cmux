name: Docker (cmux-www)

on:
  push:
    branches: [main]
    paths:
      # WWW application
      - 'apps/www/**'
      # Shared packages used by www
      - 'packages/shared/**'
      - 'packages/convex/**'
      - 'packages/www-openapi-client/**'
      - 'packages/pve-lxc-client/**'
      # Root dependencies
      - 'package.json'
      - 'bun.lock'
      - '.npmrc'
      # This workflow
      - '.github/workflows/docker-www-build.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Trigger Coolify deploy after build"
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

concurrency:
  group: docker-cmux-www-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: cmux-www
  DOCKERFILE: apps/www/Dockerfile
  CONTEXT: .

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            docker.io/${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=www-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=www-${{ matrix.platform }}
          build-args: |
            NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
            NEXT_PUBLIC_STACK_PROJECT_ID=${{ secrets.NEXT_PUBLIC_STACK_PROJECT_ID }}
            NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY=${{ secrets.NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY }}
            NEXT_PUBLIC_GITHUB_APP_SLUG=${{ secrets.NEXT_PUBLIC_GITHUB_APP_SLUG }}
            NEXT_PUBLIC_WWW_ORIGIN=${{ secrets.NEXT_PUBLIC_WWW_ORIGIN }}
            NEXT_PUBLIC_CLIENT_ORIGIN=${{ secrets.NEXT_PUBLIC_CLIENT_ORIGIN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: www-digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create multi-arch manifest
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 10
    outputs:
      image_digest: ${{ steps.inspect.outputs.digest }}

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: www-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            docker.io/${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}

      - name: Create GHCR manifest and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map(select(startswith("ghcr.io"))) | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Create Docker Hub manifest and push
        working-directory: /tmp/digests
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
        run: |
          # Build digest list for Docker Hub
          for digest in *; do
            docker buildx imagetools create \
              -t docker.io/${DOCKER_USER}/${{ env.IMAGE_NAME }}:sha256-${digest} \
              ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@sha256:${digest} || true
          done

          # Create multi-arch manifest on Docker Hub
          docker buildx imagetools create $(jq -cr '.tags | map(select(startswith("docker.io"))) | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Output image info
        run: |
          echo "## Docker Image Built (Multi-Arch)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Manifest:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest >> $GITHUB_STEP_SUMMARY 2>&1 || echo "Failed to inspect" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  trigger-coolify:
    name: Trigger Coolify deployment
    runs-on: ubuntu-24.04
    needs: merge
    if: github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || inputs.force_deploy)
    timeout-minutes: 5

    steps:
      - name: Trigger Coolify deploy
        id: trigger_coolify
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_WWW_APP_UUID: ${{ secrets.COOLIFY_WWW_APP_UUID }}
        run: |
          set -euo pipefail

          if [[ -z "${COOLIFY_BASE_URL:-}" || -z "${COOLIFY_API_TOKEN:-}" || -z "${COOLIFY_WWW_APP_UUID:-}" ]]; then
            echo "Coolify secrets not configured for www, skipping deploy trigger"
            echo "triggered=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_url="${COOLIFY_BASE_URL%/}"

          echo "Triggering Coolify deployment for cmux-www..."

          response=$(curl -sS -w "\n%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            -X GET \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            "${base_url}/api/v1/deploy?uuid=${COOLIFY_WWW_APP_UUID}&force=true" || true)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [[ "$http_code" == "200" || "$http_code" == "201" ]]; then
            echo "Successfully triggered Coolify deployment"
            echo "Response: $body"
            echo "triggered=true" >> "$GITHUB_OUTPUT"
          else
            echo "Warning: Coolify deploy trigger returned HTTP ${http_code}"
            echo "Response: $body"
            echo "triggered=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Start deployment status tracking
        if: steps.trigger_coolify.outputs.triggered == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.createDispatchEvent({
              owner,
              repo,
              event_type: "coolify-www-deploy-started",
              client_payload: {
                sha: context.sha,
              },
            });
