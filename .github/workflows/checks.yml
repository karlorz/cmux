name: Checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-24.04
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install

      - name: Checks and tests (parallel on one runner)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Stack Auth env vars
          STACK_SECRET_SERVER_KEY: ${{ secrets.STACK_SECRET_SERVER_KEY }}
          STACK_SUPER_SECRET_ADMIN_KEY: ${{ secrets.STACK_SUPER_SECRET_ADMIN_KEY }}
          STACK_DATA_VAULT_SECRET: ${{ secrets.STACK_DATA_VAULT_SECRET }}
          NEXT_PUBLIC_STACK_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_STACK_PROJECT_ID }}
          NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${{ secrets.NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY }}
          # GitHub App
          CMUX_GITHUB_APP_ID: ${{ secrets.CMUX_GITHUB_APP_ID }}
          CMUX_GITHUB_APP_PRIVATE_KEY: ${{ secrets.CMUX_GITHUB_APP_PRIVATE_KEY }}
          CMUX_TASK_RUN_JWT_SECRET: ${{ secrets.CMUX_TASK_RUN_JWT_SECRET }}
          # API Keys
          MORPH_API_KEY: ${{ secrets.MORPH_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Convex - Cloud (use CONVEX_DEPLOY_KEY) or Self-hosted (use CONVEX_SELF_HOSTED_*)
          # When CONVEX_SELF_HOSTED_ADMIN_KEY is set, CONVEX_DEPLOY_KEY is unset in the run script
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_SELF_HOSTED_URL: ${{ secrets.CONVEX_SELF_HOSTED_URL }}
          CONVEX_SELF_HOSTED_ADMIN_KEY: ${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_WWW_ORIGIN: ${{ secrets.NEXT_PUBLIC_WWW_ORIGIN }}
          NEXT_PUBLIC_GITHUB_APP_SLUG: ${{ secrets.NEXT_PUBLIC_GITHUB_APP_SLUG }}
          # Test user and team
          STACK_TEST_USER_ID: ${{ secrets.STACK_TEST_USER_ID }}
          CMUX_TEST_TEAM_SLUG: ${{ secrets.CMUX_TEST_TEAM_SLUG }}
        run: |
          set -euo pipefail
          # Unset CONVEX_DEPLOY_KEY when using self-hosted Convex
          if [ -n "$CONVEX_SELF_HOSTED_ADMIN_KEY" ]; then
            unset CONVEX_DEPLOY_KEY
          fi
          bun run check & pid1=$!
          (cd packages/cmux && bun run test) & pid2=$!
          wait $pid1; s1=$?
          wait $pid2; s2=$?
          if [ $s1 -ne 0 ] || [ $s2 -ne 0 ]; then
            echo "At least one task failed"
            exit 1
          fi

  # Simplify review for PRs (optional, runs in report-only mode)
  simplify-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for diff

      - name: Get changed files
        id: changed
        run: |
          # Get list of changed TypeScript/JavaScript files
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' | head -20)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          # Count files for summary (handle empty case properly)
          if [ -n "$CHANGED" ]; then
            COUNT=$(echo "$CHANGED" | grep -c . || echo 0)
          else
            COUNT=0
          fi
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Generate simplify summary
        if: steps.changed.outputs.count > 0
        id: summary
        run: |
          echo "## Code Quality Summary" > /tmp/simplify-summary.md
          echo "" >> /tmp/simplify-summary.md
          echo "The following files were changed in this PR:" >> /tmp/simplify-summary.md
          echo "" >> /tmp/simplify-summary.md
          echo '```' >> /tmp/simplify-summary.md
          echo "${{ steps.changed.outputs.files }}" >> /tmp/simplify-summary.md
          echo '```' >> /tmp/simplify-summary.md
          echo "" >> /tmp/simplify-summary.md
          echo "**Tip**: Run \`/simplify\` locally to review these changes for:" >> /tmp/simplify-summary.md
          echo "- Code reuse opportunities" >> /tmp/simplify-summary.md
          echo "- Quality improvements" >> /tmp/simplify-summary.md
          echo "- Efficiency optimizations" >> /tmp/simplify-summary.md

      - name: Post PR comment
        if: steps.changed.outputs.count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('/tmp/simplify-summary.md', 'utf8');

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const marker = '<!-- simplify-review -->';
            const body = `${marker}\n${summary}`;
            const existingComment = comments.find(c => c.body.includes(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
