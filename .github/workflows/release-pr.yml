name: Daily Release PR

on:
  schedule:
    - cron: "30 12 * * *" # 4:30 AM PT
    - cron: "0 3 * * *" # 7:00 PM PT
  workflow_dispatch:

concurrency:
  group: release-pr
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: "24"
  BUN_VERSION: "1.2.21"

jobs:
  open-release-pr:
    name: Open draft release PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Check for changes since release baseline
        id: release_changes
        run: |
          baseline_tag="$(bun ./scripts/resolve-release-version.ts baseline-tag --remote origin 2>/dev/null || echo "")"

          if [ -z "$baseline_tag" ]; then
            echo "No mirrored upstream release tags found. Proceeding with release." >> "$GITHUB_STEP_SUMMARY"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin "refs/tags/$baseline_tag:refs/tags/$baseline_tag"

          if git diff --quiet "$baseline_tag"..HEAD; then
            echo "No changes since release baseline ($baseline_tag)." >> "$GITHUB_STEP_SUMMARY"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected since release baseline ($baseline_tag)." >> "$GITHUB_STEP_SUMMARY"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.release_changes.outputs.proceed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies (skip Electron download, retry on transient failure)
        if: steps.release_changes.outputs.proceed == 'true'
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "bun install attempt $attempt of 3..."

            if bun install --frozen-lockfile; then
              echo "bun install succeeded on attempt $attempt"
              break
            fi

            if [[ $attempt -eq 3 ]]; then
              echo "bun install failed after 3 attempts" >&2
              exit 1
            fi

            echo "bun install failed on attempt $attempt, retrying in 10 seconds..." >&2
            sleep 10
          done

      - name: Configure git user
        if: steps.release_changes.outputs.proceed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create draft release PR
        id: create_release_pr
        if: steps.release_changes.outputs.proceed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: bun ./scripts/release-pr.ts

      - name: Note tag handoff after merge
        if: steps.release_changes.outputs.proceed == 'true'
        run: |
          echo "Daily Release PR only prepares the fork release branch." >> "$GITHUB_STEP_SUMMARY"
          echo "Publishing now happens only after the PR is merged and the suffixed tag is created on main." >> "$GITHUB_STEP_SUMMARY"

      - name: Skip release (no changes)
        if: steps.release_changes.outputs.proceed == 'false'
        run: echo "Skipping release because no changes were detected since the fork release baseline."
