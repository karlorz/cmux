name: Deploy Edge Router (PVE-LXC)

on:
  push:
    branches: [main]
    paths:
      - 'apps/edge-router-pvelxc/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: edge-router-pvelxc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: apps/edge-router-pvelxc

      - name: Deploy to Cloudflare Workers
        run: bun run deploy
        working-directory: apps/edge-router-pvelxc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
