name: Docker (cmux-client)

on:
  push:
    branches: [main]
    paths:
      # Web services
      - 'apps/client/**'
      - 'apps/www/**'
      - 'apps/server/**'
      # Shared packages used by the unified cmux-web stack
      - 'packages/shared/**'
      - 'packages/convex/**'
      - 'packages/www-openapi-client/**'
      - 'packages/e2b-client/**'
      - 'packages/pve-lxc-client/**'
      # Coolify deployment config
      - 'docker-compose.coolify.yml'
      - '.github/workflows/coolify-deploy.yml'
      # Root dependencies
      - 'package.json'
      - 'bun.lock'
      - '.npmrc'
      # Web image workflows
      - '.github/workflows/docker-client-build.yml'
      - '.github/workflows/docker-www-build.yml'
      - '.github/workflows/docker-server-build.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: docker-cmux-client-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: cmux-client
  DOCKERFILE: apps/client/Dockerfile
  CONTEXT: .

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            docker.io/${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=client-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=client-${{ matrix.platform }}
          build-args: |
            NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
            NEXT_PUBLIC_STACK_PROJECT_ID=${{ secrets.NEXT_PUBLIC_STACK_PROJECT_ID }}
            NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY=${{ secrets.NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY }}
            NEXT_PUBLIC_GITHUB_APP_SLUG=${{ secrets.NEXT_PUBLIC_GITHUB_APP_SLUG }}
            NEXT_PUBLIC_WWW_ORIGIN=${{ secrets.NEXT_PUBLIC_WWW_ORIGIN }}
            NEXT_PUBLIC_SERVER_ORIGIN=${{ secrets.NEXT_PUBLIC_SERVER_ORIGIN }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_CMUX_PROTOCOL=${{ secrets.NEXT_PUBLIC_CMUX_PROTOCOL }}
            NEXT_PUBLIC_WEB_MODE=${{ secrets.NEXT_PUBLIC_WEB_MODE }}
            NEXT_PUBLIC_SENTRY_WEB_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_WEB_DSN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: client-digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create multi-arch manifest
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 10
    outputs:
      image_digest: ${{ steps.inspect.outputs.digest }}

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: client-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        id: docker_hub_login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            docker.io/${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=raw,value={{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}

      - name: Create GHCR manifest and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map(select(startswith("ghcr.io"))) | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect GHCR manifest
        id: inspect
        run: |
          digest="$(docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7} | sed -n 's/^Digest:[[:space:]]*//p' | head -n1)"
          if [[ -z "${digest:-}" ]]; then
            echo "::error::Failed to resolve GHCR manifest digest"
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Create Docker Hub manifest and push
        if: steps.docker_hub_login.outcome == 'success'
        working-directory: /tmp/digests
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
        run: |
          # Build digest list for Docker Hub
          for digest in *; do
            docker buildx imagetools create \
              -t docker.io/${DOCKER_USER}/${{ env.IMAGE_NAME }}:sha256-${digest} \
              ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@sha256:${digest} || true
          done

          # Create multi-arch manifest on Docker Hub
          docker buildx imagetools create $(jq -cr '.tags | map(select(startswith("docker.io"))) | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Warn when Docker Hub publish is skipped
        if: steps.docker_hub_login.outcome != 'success'
        run: echo "::warning::Skipping Docker Hub publish because Docker Hub login failed"

      - name: Output image info
        run: |
          echo "## Docker Image Built (Multi-Arch)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Immutable Ref:** ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.inspect.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Manifest:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7} >> $GITHUB_STEP_SUMMARY 2>&1 || echo "Failed to inspect" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
