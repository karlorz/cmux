name: Coolify Status (cmux-client)

# This workflow tracks Coolify deployment status for GitHub Deployments UI.
# The actual deployment is triggered by docker-client-build.yml after pushing the image.
# This workflow is triggered by repository_dispatch from docker-client-build.yml
# or can be manually triggered to check deployment status.

on:
  repository_dispatch:
    types: [coolify-client-deploy-started]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to track (defaults to latest)"
        required: false

permissions:
  contents: read
  deployments: write

concurrency:
  group: coolify-status-cmux-client
  cancel-in-progress: false

jobs:
  track-deployment:
    name: Track Coolify deployment
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ENVIRONMENT_NAME: Production - cmux-client
      TARGET_SHA: ${{ github.event.client_payload.sha || inputs.commit_sha || github.sha }}

    steps:
      - name: Create GitHub deployment
        id: gh_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const ref = process.env.TARGET_SHA;
            const runUrl = process.env.RUN_URL;
            const environment = process.env.ENVIRONMENT_NAME;

            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref,
              environment,
              auto_merge: false,
              required_contexts: [],
              description: `Coolify deploy for ${ref.slice(0, 7)}`,
              transient_environment: false,
              production_environment: true,
            });

            core.setOutput("deployment_id", deployment.data.id);

            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deployment.data.id,
              state: "in_progress",
              log_url: runUrl,
              description: "Waiting for Coolify deployment",
            });

      - name: Wait for Coolify deployment
        id: coolify
        shell: bash
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_CLIENT_APP_UUID: ${{ secrets.COOLIFY_CLIENT_APP_UUID }}
          COOLIFY_CLIENT_ENV_URL: ${{ secrets.COOLIFY_CLIENT_ENV_URL }}
        run: |
          set -euo pipefail

          if [[ -z "${COOLIFY_BASE_URL:-}" ]]; then
            echo "Missing required secret: COOLIFY_BASE_URL" >&2
            exit 1
          fi
          if [[ -z "${COOLIFY_API_TOKEN:-}" ]]; then
            echo "Missing required secret: COOLIFY_API_TOKEN" >&2
            exit 1
          fi

          base_url="${COOLIFY_BASE_URL%/}"
          sha="${TARGET_SHA}"
          sha7="${sha:0:7}"

          auth_header="Authorization: Bearer ${COOLIFY_API_TOKEN}"

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          poll_interval_seconds=10
          deploy_timeout_seconds=$((30 * 60))

          now_epoch() { date +%s; }

          http_get_json() {
            local url="$1"
            local out_file="$2"
            curl -sS -o "$out_file" -w '%{http_code}' \
              --connect-timeout 10 --max-time 30 --retry 3 --retry-delay 1 \
              -H "Accept: application/json" -H "$auth_header" \
              "$url" || true
          }

          normalize_status() {
            local raw="$1"
            raw="$(echo "$raw" | tr '[:upper:]' '[:lower:]')"
            case "$raw" in
              success|succeeded|finished|completed) echo "success" ;;
              failed|failure|error|errored|cancelled|canceled) echo "failure" ;;
              running|queued|in_progress|in-progress|pending) echo "running" ;;
              *) echo "$raw" ;;
            esac
          }

          is_http_url() {
            [[ "${1:-}" =~ ^https?://[^[:space:]]+$ ]]
          }

          resolve_deployment_url() {
            local url_raw="${1:-}"
            if is_http_url "$url_raw"; then
              echo "$url_raw"
            elif is_http_url "${COOLIFY_CLIENT_ENV_URL:-}"; then
              echo "${COOLIFY_CLIENT_ENV_URL}"
            elif [[ -n "$url_raw" ]]; then
              echo "${base_url}/${url_raw#/}"
            fi
          }

          # Find latest deployment for our app
          find_latest_deployment() {
            local resp="$tmp_dir/deployments.json"
            local code
            local dep_uuid

            code="$(http_get_json "${base_url}/api/v1/applications/${COOLIFY_CLIENT_APP_UUID}/deployments?skip=0&take=5" "$resp")"
            if [[ "$code" != "200" ]]; then
              return 1
            fi

            # Get the most recent deployment (first in list)
            dep_uuid="$(jq -r '
              (if type=="array" then .
               elif has("data") and (.data|type)=="array" then .data
               elif has("deployments") and (.deployments|type)=="array" then .deployments
               else [] end)
              | .[0]
              | (.deployment_uuid // .uuid // empty)
            ' "$resp" 2>/dev/null || true)"

            if [[ -n "${dep_uuid:-}" && "${dep_uuid:-null}" != "null" ]]; then
              echo "$dep_uuid"
              return 0
            fi

            return 1
          }

          echo "Waiting for Coolify deployment to complete..." >&2
          start_epoch="$(now_epoch)"
          deadline=$((start_epoch + deploy_timeout_seconds))

          # Wait a moment for deployment to be created
          sleep 10

          deployment_uuid="$(find_latest_deployment || true)"
          if [[ -z "${deployment_uuid:-}" ]]; then
            echo "No deployment found for app ${COOLIFY_CLIENT_APP_UUID}" >&2
            echo "conclusion=failure" >> "$GITHUB_OUTPUT"
            echo "coolify_status=no_deployment_found" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Found deployment UUID: ${deployment_uuid}" >&2

          detail_url="${base_url}/api/v1/deployments/${deployment_uuid}"
          resp="$tmp_dir/detail.json"

          while (( $(now_epoch) < deadline )); do
            code="$(http_get_json "$detail_url" "$resp")"
            if [[ "$code" != "200" ]]; then
              echo "Coolify API returned HTTP ${code}, retrying..." >&2
              sleep "$poll_interval_seconds"
              continue
            fi

            raw_status="$(jq -r '.status // empty' "$resp" 2>/dev/null || true)"
            norm_status="$(normalize_status "${raw_status:-unknown}")"

            deployment_url_raw="$(jq -r '.deployment_url // empty' "$resp" 2>/dev/null || true)"
            deployment_url="$(resolve_deployment_url "${deployment_url_raw:-}")"

            echo "coolify_status=${raw_status:-unknown}" >> "$GITHUB_OUTPUT"
            echo "deployment_url=${deployment_url:-}" >> "$GITHUB_OUTPUT"

            if [[ "$norm_status" == "success" ]]; then
              echo "conclusion=success" >> "$GITHUB_OUTPUT"
              echo "Coolify deployment succeeded!" >&2
              exit 0
            fi

            if [[ "$norm_status" == "failure" ]]; then
              echo "conclusion=failure" >> "$GITHUB_OUTPUT"
              echo "Coolify deployment failed (status: ${raw_status})." >&2
              exit 1
            fi

            echo "Coolify deployment status: ${raw_status:-unknown} (waiting...)" >&2
            sleep "$poll_interval_seconds"
          done

          echo "conclusion=failure" >> "$GITHUB_OUTPUT"
          echo "coolify_status=timeout" >> "$GITHUB_OUTPUT"
          echo "Timed out waiting for Coolify deployment." >&2
          exit 1

      - name: Update GitHub deployment status
        if: always()
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.gh_deployment.outputs.deployment_id }}
          CONCLUSION: ${{ steps.coolify.outputs.conclusion }}
          ENVIRONMENT_URL: ${{ steps.coolify.outputs.deployment_url }}
          COOLIFY_STATUS: ${{ steps.coolify.outputs.coolify_status }}
        with:
          script: |
            const deploymentIdRaw = process.env.DEPLOYMENT_ID;
            if (!deploymentIdRaw) {
              core.warning("No GitHub deployment id found. Skipping status update.");
              return;
            }

            const { owner, repo } = context.repo;
            const deploymentId = Number(deploymentIdRaw);
            const runUrl = process.env.RUN_URL;
            const conclusion = process.env.CONCLUSION || "failure";
            const envUrlRaw = (process.env.ENVIRONMENT_URL || "").trim();
            const envUrl = /^https?:\/\/\S+$/i.test(envUrlRaw) ? envUrlRaw : undefined;
            const coolifyStatus = process.env.COOLIFY_STATUS || "unknown";

            const state = conclusion === "success" ? "success" : "failure";
            const description =
              state === "success"
                ? "Coolify deployment succeeded"
                : `Coolify deployment failed (${coolifyStatus})`;

            const payload = {
              owner,
              repo,
              deployment_id: deploymentId,
              state,
              log_url: runUrl,
              description,
            };
            if (envUrl) {
              payload.environment_url = envUrl;
            }

            await github.rest.repos.createDeploymentStatus(payload);
