name: Weekly Upstream Sync PR

on:
  schedule:
    - cron: "0 18 * * 0" # Every Sunday 2am HKT (6pm UTC Saturday)
  workflow_dispatch:

concurrency:
  group: sync-upstream-pr
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  mirror-upstream-tags:
    name: Mirror upstream release tags
    runs-on: ubuntu-latest
    env:
      SYNC_TOKEN: ${{ secrets.KARL_DIGI_TOKEN }}
    steps:
      - name: Checkout karlorz/cmux
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Configure upstream remote
        run: git remote add upstream https://github.com/manaflow-ai/manaflow.git

      - name: Configure authenticated remotes
        env:
          GH_TOKEN: ${{ env.SYNC_TOKEN }}
        run: |
          if [ -z "${SYNC_TOKEN}" ]; then
            echo "::error::KARL_DIGI_TOKEN secret is required for upstream sync."
            exit 1
          fi

          git remote set-url origin https://x-access-token:${SYNC_TOKEN}@github.com/karlorz/cmux.git
          git remote add karl-digi https://x-access-token:${SYNC_TOKEN}@github.com/karl-digi/manaflow.git

      - name: Mirror upstream plain release tags onto karlorz/cmux
        env:
          GH_TOKEN: ${{ env.SYNC_TOKEN }}
          GITHUB_REPO: karlorz/cmux
        run: ./scripts/sync-upstream-tags.sh

      - name: Mirror upstream plain release tags onto karl-digi/manaflow
        env:
          GH_TOKEN: ${{ env.SYNC_TOKEN }}
          GITHUB_REPO: karl-digi/manaflow
        run: |
          ./scripts/sync-upstream-tags.sh \
            --repo karl-digi/manaflow \
            --source-remote upstream \
            --target-remote karl-digi

  sync-upstream-pr:
    name: Sync karl-digi/manaflow PR
    runs-on: ubuntu-latest
    env:
      SYNC_TOKEN: ${{ secrets.KARL_DIGI_TOKEN }}
    steps:
      - name: Checkout karlorz/cmux
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure remotes
        run: |
          if [ -z "${SYNC_TOKEN}" ]; then
            echo "::error::KARL_DIGI_TOKEN secret is required for upstream sync."
            exit 1
          fi

          git remote add upstream https://github.com/manaflow-ai/manaflow.git
          git remote add karl-digi https://x-access-token:${SYNC_TOKEN}@github.com/karl-digi/manaflow.git
          git fetch --no-tags upstream main

      - name: Sync karl-digi/manaflow main from upstream
        run: |
          git push karl-digi refs/remotes/upstream/main:refs/heads/main --force

      - name: Force-push karlorz/cmux:main to karl-digi/manaflow:karlorz-cmux-main
        run: |
          git push karl-digi origin/main:refs/heads/karlorz-cmux-main --force
